set -ga terminal-overrides ",screen-256color*:Tc"
set-option -g default-terminal "screen-256color"
set -s escape-time 0

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix
set -g status-style 'bg=#333333 fg=#5eacd3'

# Switch to another session instead of exiting when closing last window
set-option -g detach-on-destroy off

bind r source-file ~/.config/tmux/tmux.conf
set -g base-index 1

# Prevent automatic window renaming
set-option -g allow-rename off
set-window-option -g automatic-rename off

set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# vim-like pane switching
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

bind-key 0 kill-session

bind-key -r f run-shell "tmux neww ~/.local/bin/scripts/tmux-sessionizer"
bind-key -r t run-shell "tmux neww ~/.local/bin/scripts/tmux-sessionizer --simple"

#bind-key -r c run-shell "~/.local/bin/scripts/tmux-sessionizer ~/dot"
bind-key -r o run-shell "~/.local/bin/scripts/tmux-sessionizer ~/Documents/obsd"

# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Restore more programs (including claude, nvim, lazygit)
set -g @resurrect-processes 'nvim claude lazygit ssh watch "~/.local/bin/scripts/*"'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# Preserve custom window names
set -g @resurrect-save-window-name 'on'

# Disabled: causes hangs on WSL
# set -g @continuum-restore 'on'

run '~/.config/tmux/plugins/tpm/tpm'
